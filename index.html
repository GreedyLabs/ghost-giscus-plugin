    <meta name="description" content="Keep the official giscus script as-is and pick where comments mount with one line. Works through Ghost code injection with no theme editing.">

    <script>
        (function () {
            var supported = ["ko","en","ja","zh","es","fr","de","pt","hi"];
            var def = "en";
            var n = ((navigator.languages && navigator.languages[0]) || navigator.language || def).toLowerCase();
            var pick = def;
            for (var i = 0; i < supported.length; i++) {
                if (n === supported[i] || n.indexOf(supported[i] + '-') === 0) { pick = supported[i]; break; }
            }
            location.replace('/' + pick + '/');
        })();
    </script>
